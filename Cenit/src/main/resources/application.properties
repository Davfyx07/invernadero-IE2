spring.application.name=Cenit
spring.profiles.active=local
# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cenit}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Admin777}

# JPA — Hibernate no toca la BD, Flyway se encarga
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway — aplica los .sql de db/migration automáticamente
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

#google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyParaDesarrolloLocalCenit2025}
jwt.expiration-hours=24

# Frontend
app.frontend-url=http://localhost:5173

# Email (SMTP Gmail por defecto, configurar credenciales reales para producción)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true