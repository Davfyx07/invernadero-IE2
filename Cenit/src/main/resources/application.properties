spring.application.name=Cenit
# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cenit}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Admin777}

# JPA — Hibernate no toca la BD, Flyway se encarga
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway — aplica los .sql de db/migration automáticamente
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile