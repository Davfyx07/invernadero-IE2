name: CI — Cenit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Backend ────────────────────────────────────────────────
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cenit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cenit
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DB_URL: jdbc:postgresql://localhost:5432/cenit
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Tests
        run: mvn test
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DB_URL: jdbc:postgresql://localhost:5432/cenit
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Generar Javadoc
        run: mvn javadoc:javadoc -DskipTests
        continue-on-error: true

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cenit-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cenit-web/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Frontend Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Validar Commits con Taiga
        working-directory: .
        env:
          TAIGA_API_URL: ${{ secrets.TAIGA_API_URL }}
          TAIGA_USERNAME: ${{ secrets.TAIGA_USERNAME }}
          TAIGA_PASSWORD: ${{ secrets.TAIGA_PASSWORD }}
          TAIGA_PROJECT_ID: ${{ secrets.TAIGA_PROJECT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          python scripts/validar_taiga.py "$COMMIT_MSG"

      - name: Comparar Commits
        working-directory: .
        run: python scripts/compare_commits.py --save

      - name: Upload Reporte de Cambios
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cambios
          path: reporte-cambios.md

  # ─── Deploy Backend (VPS) ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend to VPS
    needs: backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/cenit
            git pull origin main
            docker-compose up -d --build
            docker-compose ps

