# ─── Perfil produccion ─────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cenit}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}
jwt.expiration-hours=24

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

app.frontend-url=${APP_FRONTEND_URL:https://cenit.vercel.app}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Admin inicial (se usan en V10__seed_admin.sql) ──
app.admin.email=${ADMIN_EMAIL:admin@cenit.app}
app.admin.password=${ADMIN_PASSWORD}
