# ─── Perfil produccion ─────────────────────────────
# Base de datos en Neon (serverless PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}
jwt.expiration-hours=24

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

app.frontend-url=${APP_FRONTEND_URL:https://cenit.vercel.app}

# Resend Email Service API
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ─── Admin inicial (creado por ProdDataSeeder) ──
app.admin.email=${ADMIN_EMAIL:jdavidlozano07@gmail.com}
app.admin.password=${ADMIN_PASSWORD}
